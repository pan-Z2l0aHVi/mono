      #   run: |
      #     docker build -t your-registry/${{ inputs.app }}:${{ github.sha }} .
      #     docker push your-registry/${{ inputs.app }}:${{ github.sha }}
      #   需要 secrets.DOCKER_REGISTRY / secrets.DOCKER_USERNAME / secrets.DOCKER_PASSWORD

